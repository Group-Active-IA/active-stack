# ── Starters (bundles curados de harnesses, componibles vía includes) ─────────
# C-30: composición curada. Cada starter resuelve su set total vía ResolveStarter.
# Convención de includes: starter hijo → starter padre provee los transversales.
# L2: description y long_description son bilingües y OBLIGATORIOS para TODOS los starters.
starters:
  # base: 6 harnesses transversales compartidos por todos los starters de dominio.
  - id: base
    name: Base
    description: { es: "Transversales metodológicos compartidos por todos los starters (TDD, debugging, code review, producto ágil).", en: "Cross-cutting methodology shared by every starter (TDD, debugging, code review, agile product)." }
    long_description: { es: "El bundle base de harnesses metodológicos transversales que todo starter de dominio incluye. Agrupa 6 skills—TDD (red/green/refactor), debugging sistemático, solicitar y recibir code review, excelencia en review y product owner ágil—que se clonan al directorio de skills del agente vía `active-stack starter add`. Elegilo si querés la metodología de trabajo compartida sin la capa técnica de un stack particular. Rara vez se instala solo: `backend`, `ux-ui` y `active-ia` ya lo incluyen y deduplican.", en: "The base bundle of cross-cutting methodology harnesses that every domain starter includes. It groups 6 skills—TDD (red/green/refactor), systematic debugging, requesting and receiving code review, review excellence, and agile product owner—cloned into the agent's skills directory via `active-stack starter add`. Choose it when you want the shared working methodology without a specific stack's technical layer. It's rarely installed alone: `backend`, `ux-ui`, and `active-ia` already include and dedupe it." }
    harnesses:
      - test-driven-development
      - systematic-debugging
      - requesting-code-review
      - receiving-code-review
      - code-review-excellence
      - agile-product-owner

  # backend: base + 12 harnesses de capa backend.
  - id: backend
    name: Backend
    description: { es: "Stack de backend Python/FastAPI con arquitectura limpia, BD, seguridad y contenedores.", en: "Python/FastAPI backend stack with clean architecture, database, security, and containers." }
    long_description: { es: "El starter de backend Python/FastAPI con arquitectura limpia. Compone la base metodológica más 12 harnesses de capa backend—arquitectura limpia, FastAPI, migraciones Alembic, Redis, WebSockets, testing con pytest, PostgreSQL (diseño y optimización), seguridad de APIs y Docker multi-etapa—clonados vía `active-stack starter add`. Elegilo cuando arrancás un servicio backend en Python y querés los patrones de dominio, datos, seguridad y contenedores ya cargados. Si tu proyecto es solo frontend, usá `ux-ui`.", en: "The Python/FastAPI backend starter with clean architecture. It composes the methodology base plus 12 backend-layer harnesses—clean architecture, FastAPI, Alembic migrations, Redis, WebSockets, pytest testing, PostgreSQL (design and optimization), API security, and multi-stage Docker—cloned via `active-stack starter add`. Choose it when starting a Python backend service and you want the domain, data, security, and container patterns preloaded. If your project is frontend-only, use `ux-ui`." }
    includes: [base]
    harnesses:
      - clean-architecture
      - fastapi-domain-service
      - fastapi-code-review
      - redis-best-practices
      - websocket-engineer
      - alembic-migrations
      - fastapi-templates
      - python-testing-patterns
      - postgresql-table-design
      - postgresql-optimization
      - api-security-best-practices
      - multi-stage-dockerfile

  # ux-ui: base + 11 harnesses de capa frontend/UX.
  - id: ux-ui
    name: UX/UI
    description: { es: "Stack de frontend React con diseño, estado, formularios, WebSockets y testing E2E.", en: "React frontend stack with design, state, forms, WebSockets, and E2E testing." }
    long_description: { es: "El starter de frontend React con diseño, estado y testing E2E. Compone la base metodológica más 11 harnesses de capa frontend—React, Zustand, formularios con React 19, dashboards CRUD, suscripciones WebSocket, PWA, tipos avanzados de TypeScript, sistema de diseño Tailwind y testing E2E con Playwright—clonados vía `active-stack starter add`. Elegilo cuando construís una interfaz React y querés los patrones de UI, estado y pruebas ya listos. Si tu proyecto es solo backend, usá `backend`.", en: "The React frontend starter with design, state, and E2E testing. It composes the methodology base plus 11 frontend-layer harnesses—React, Zustand, React 19 forms, CRUD dashboards, WebSocket subscriptions, PWA, advanced TypeScript types, a Tailwind design system, and Playwright E2E testing—cloned via `active-stack starter add`. Choose it when building a React interface and you want the UI, state, and testing patterns ready to go. If your project is backend-only, use `backend`." }
    includes: [base]
    harnesses:
      - vercel-react-best-practices
      - zustand-store-pattern
      - react19-form-pattern
      - dashboard-crud-page
      - ws-frontend-subscription
      - help-system-content
      - interface-design
      - pwa-development
      - typescript-advanced-types
      - tailwind-design-system
      - playwright-best-practices

  # active-ia: backend + ux-ui + monorepo-scaffold. base se deduplica automáticamente.
  - id: active-ia
    name: Active IA
    description: { es: "Stack completo para proyectos de IA activa (compone backend + ux-ui + monorepo).", en: "Full stack for Active IA projects (composes backend + ux-ui + monorepo)." }
    long_description: { es: "El starter full-stack completo para proyectos de Active IA. Compone `backend` + `ux-ui` + el scaffold de monorepo, deduplicando la base automáticamente, así que instala toda la metodología, la capa backend y la frontend en una sola corrida vía `active-stack starter add`. Elegilo cuando levantás un proyecto full-stack de punta a punta y querés el kit completo desde el día uno. Si solo trabajás una capa, `backend` o `ux-ui` son más acotados.", en: "The complete full-stack starter for Active IA projects. It composes `backend` + `ux-ui` + the monorepo scaffold, deduping the base automatically, so it installs the whole methodology, the backend layer, and the frontend layer in a single run via `active-stack starter add`. Choose it when standing up an end-to-end full-stack project and you want the complete kit from day one. If you're working a single layer, `backend` or `ux-ui` are more focused." }
    includes: [backend, ux-ui]
    harnesses:
      - monorepo-scaffold

  # tutor-tupad: sin base (no es un stack de código) — dominio de tutoría TUP.
  - id: tutor-tupad
    name: Tutor TUPAD
    description: { es: "Stack para tutores TUPAD: rúbricas de evaluación + operación del campus Moodle.", en: "Stack for TUPAD tutors: grading rubrics + Moodle campus operation." }
    long_description: { es: "El starter para tutores de la Tecnicatura Universitaria en Programación (TUPAD, UTN). Agrupa 2 harnesses—`rubrica-builder`, que crea, cura y audita rúbricas de evaluación autosuficientes para Active-IA, y `tup-campus-navigator`, que opera el campus Moodle de la TUP por API REST (pendientes, notas, informes por comisión)—clonados vía `active-stack starter add`. Elegilo si sos tutor de la TUPAD y necesitás las skills de rúbricas y campus en un solo paquete. No incluye la base metodológica de código (TDD, arquitectura): es un dominio de tutoría, no de desarrollo.", en: "The starter for tutors of the Tecnicatura Universitaria en Programación (TUPAD, UTN). It groups 2 harnesses—`rubrica-builder`, which creates, curates, and audits self-sufficient Active-IA grading rubrics, and `tup-campus-navigator`, which operates the TUP Moodle campus via REST API (pending work, grades, per-section reports)—cloned via `active-stack starter add`. Choose it if you tutor for TUPAD and need the rubric and campus skills in one bundle. It does not include the code methodology base (TDD, architecture): this is a tutoring domain, not a development one." }
    harnesses:
      - rubrica-builder
      - tup-campus-navigator
