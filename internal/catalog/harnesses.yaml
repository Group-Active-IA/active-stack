# Active Stack — Catálogo maestro de harnesses (embebido en el instalador).
# Fuente de verdad de qué harnesses existen, de qué tipo son, de dónde se
# obtienen, en qué modo entran y de qué dependen.
#
# Convención de modos: un harness de Lite lista [lite, full] (Full incluye a
# Lite). Un harness exclusivo de Full lista [full]. Custom matchea todos.
#
# L2 (catalog-localized-descriptions): description es bilingüe ({es:, en:})
# para TODO harness/starter; long_description es bilingüe y OBLIGATORIO para
# harnesses global-picker (!IsStarterOnly()) y para TODOS los starters — es
# OPCIONAL (pero si está presente, ambos idiomas) para harnesses starter-only.
# catalog.Load() falla loudly si falta una traducción (D3, design.md).

harnesses:
  # ── Externos (no son nuestros repos; se instalan/configuran) ──────────────
  - id: openspec
    name: OpenSpec CLI
    description: { es: "CLI de Spec-Driven Development; fuente de verdad del estado.", en: "Spec-Driven Development CLI; source of truth for change state." }
    long_description: { es: "El CLI de Spec-Driven Development: la fuente de verdad del estado de cada change del proyecto. Se instala como paquete npm (`@fission-ai/openspec`) y expone el comando `openspec`, que gestiona el ciclo explorar → proponer → aplicar → archivar manteniendo specs y tareas sincronizadas. Elegilo si querés que el flujo OPSX tenga un motor real detrás en vez de coordinar changes a mano; es la base sobre la que se apoyan casi todas las skills de fundación. Si no vas a trabajar con changes especificados, no lo necesitás.", en: "The Spec-Driven Development CLI: the source of truth for every project change's state. It installs as an npm package (`@fission-ai/openspec`) and exposes the `openspec` command, which drives the explore → propose → apply → archive cycle while keeping specs and tasks in sync. Choose it when you want a real engine behind the OPSX flow instead of tracking changes by hand; it's the foundation most of the foundation skills build on. If you're not going to work with specified changes, you don't need it." }
    type: external
    external: { method: npm, pkg: "@fission-ai/openspec" }
    install_modes: [lite, full]

  - id: engram
    name: Engram
    description: { es: "Memoria persistente local (SQLite + FTS) vía MCP.", en: "Local persistent memory (SQLite + FTS) via MCP." }
    long_description: { es: "Memoria persistente local para que el contexto del proyecto sobreviva entre sesiones y compactaciones. Se instala vía Homebrew (`gentleman-programming/tap/engram`) y registra un MCP `engram` en el agente, que guarda decisiones, convenciones y descubrimientos en una base local SQLite con búsqueda full-text. Elegilo si trabajás en sesiones largas o en equipo y no querés reexplicarle al agente lo que ya se decidió; la memoria es consultable y versionable en el repo. No aporta demasiado si tus sesiones son cortas y autocontenidas.", en: "Local persistent memory so project context survives across sessions and compactions. It installs via Homebrew (`gentleman-programming/tap/engram`) and registers an `engram` MCP in the agent, storing decisions, conventions, and discoveries in a local SQLite database with full-text search. Choose it if you work in long sessions or on a team and don't want to re-explain past decisions to the agent; the memory is searchable and can be versioned in the repo. It adds little if your sessions are short and self-contained." }
    type: external
    external:
      method: homebrew
      pkg: gentleman-programming/tap/engram
      repo: Gentleman-Programming/engram
      mcp: { name: engram, command: engram, args: [mcp] }
    install_modes: [lite, full]

  - id: context7
    name: Context7
    description: { es: "Documentación de librerías al día (MCP remoto).", en: "Up-to-date library documentation (remote MCP)." }
    long_description: { es: "Documentación de librerías y frameworks siempre al día, resuelta dentro del agente. Se configura como MCP remoto (`context7`, vía `npx @upstash/context7-mcp`) que consulta la documentación oficial y actualizada en vez de depender del conocimiento de entrenamiento, que puede estar desactualizado. Elegilo cuando trabajás con librerías que cambian seguido o versiones nuevas y querés que el agente responda con la API real, no con la que recuerda. Si tu stack es estable y bien conocido, aporta menos.", en: "Always-current library and framework documentation, resolved inside the agent. It's configured as a remote MCP (`context7`, via `npx @upstash/context7-mcp`) that queries official, up-to-date docs instead of relying on training knowledge, which can be stale. Choose it when you work with fast-moving libraries or new versions and want the agent to answer with the real API rather than the one it remembers. If your stack is stable and well-known, it adds less." }
    type: external
    external:
      method: mcp
      url: "https://mcp.context7.com"
      mcp:
        name: context7
        command: npx
        args: ["-y", "--package=@upstash/context7-mcp@2.2.5", "--", "context7-mcp"]
    install_modes: [lite, full]

  # ── Configuración (bundleados en el instalador) ───────────────────────────
  - id: sdd-orchestrator
    name: SDD Orchestrator
    description: { es: "Configura el orquestador SDD con piezas componibles.", en: "Configures the SDD orchestrator with composable pieces." }
    long_description: { es: "El bloque de instrucciones que convierte al agente en un orquestador SDD: coordina, delega y decide en vez de ejecutar todo inline. Se compone a partir de toggles modulares (TDD, Engram, model-routing, delegación, governance) y se inyecta con markers idempotentes en el `CLAUDE.md`/`AGENTS.md` del agente, así que reinstalar no duplica el bloque. Elegilo si querés el flujo de coordinación completo—sub-agentes por fase, ruteo de modelos, memoria persistente y niveles de autonomía por dominio. Si preferís un agente plano sin orquestación, dejalo afuera.", en: "The instruction block that turns the agent into an SDD orchestrator: it coordinates, delegates, and decides instead of doing everything inline. It's composed from modular toggles (TDD, Engram, model-routing, delegation, governance) and injected with idempotent markers into the agent's `CLAUDE.md`/`AGENTS.md`, so reinstalling never duplicates the block. Choose it if you want the full coordination flow—per-phase sub-agents, model routing, persistent memory, and per-domain autonomy levels. If you prefer a flat agent with no orchestration, leave it out." }
    type: config
    toggles: [tdd, engram, model-routing, delegation, governance]
    install_modes: [lite, full]
    agents: [claude, codex, opencode]

  - id: permissions
    name: Permissions (security-first)
    description: { es: "Permisos seguros por defecto (bloquea .env, confirma git destructivo). No es opcional.", en: "Safe-by-default permissions (blocks .env, confirms destructive git). Not optional." }
    long_description: { es: "La configuración de permisos segura por defecto—no es opcional, siempre se instala. Preconfigura las reglas del agente para bloquear archivos sensibles (como `.env`) y pedir confirmación antes de operaciones git destructivas, inyectando el set en la config del agente. Es el piso de seguridad sobre el que después se eligen los tiers (estricto/balanceado/bypass): incluso en bypass, las denegaciones más peligrosas siguen aplicando. No se puede desactivar porque proteger tu config es el objetivo mínimo del instalador.", en: "The safe-by-default permission configuration—not optional, always installed. It pre-configures the agent's rules to block sensitive files (like `.env`) and require confirmation before destructive git operations, injecting the rule set into the agent's config. It's the security floor the tiers (strict/balanced/bypass) sit on top of: even in bypass, the most dangerous denials still apply. It can't be turned off, because protecting your config is the installer's minimum job." }
    type: config
    install_modes: [lite, full]
    agents: [claude, codex, opencode, gemini, vscode]

  # ── Skills propias ─────────────────────────────────────────────────────────
  - id: active-orchestrator
    name: active-orchestrator
    description: { es: "Orquestador delgado de la fase de fundación (openspec init → kb-creator → roadmap-generator → find-skill → agent-instruction).", en: "Thin orchestrator for the foundation phase (openspec init → kb-creator → roadmap-generator → find-skill → agent-instruction)." }
    long_description: { es: "La skill que orquesta la fase de fundación de un proyecto nuevo, sin ejecutar el trabajo inline. Se clona desde `Group-Active-IA/active-orchestrator` al directorio de skills del agente y coordina, en orden, `openspec init` → kb-creator → roadmap-generator → find-skill → agent-instruction. Elegila si arrancás un proyecto desde cero y querés que el sustrato quede listo para el ciclo OPSX en una sola corrida guiada. Es exclusiva de Full: en Lite quedaría huérfana porque orquesta skills que solo entran en Full.", en: "The skill that orchestrates a new project's foundation phase without running the work inline. It's cloned from `Group-Active-IA/active-orchestrator` into the agent's skills directory and coordinates, in order, `openspec init` → kb-creator → roadmap-generator → find-skill → agent-instruction. Choose it when you start a project from scratch and want the substrate ready for the OPSX cycle in a single guided run. It's Full-only: in Lite it would be orphaned, since it orchestrates skills that only ship in Full." }
    type: skill
    source: { repo: Group-Active-IA/active-orchestrator, ref: latest, method: clone }
    # Full-only: orquesta kb-creator/roadmap-generator/agent-instruction/find-skill,
    # todas Full. En Lite quedaría huérfano. Lite = sustrato; Full = fundación guiada.
    install_modes: [full]
    depends_on: [openspec]

  - id: kb-creator
    name: kb-creator
    description: { es: "Genera la knowledge-base canónica del dominio.", en: "Generates the canonical domain knowledge base." }
    long_description: { es: "La skill que construye la base de conocimiento canónica del proyecto. Se clona desde `Group-Active-IA/kb-creator` al directorio de skills del agente y genera los 10 documentos `.md` de la knowledge-base, ya sea a partir de fuentes existentes o de una entrevista interactiva. Elegila al empezar un proyecto para dejar documentado el dominio, las decisiones y el contexto antes de generar el roadmap. Es parte de la fundación (Full): si ya tenés tu KB armada, no la necesitás.", en: "The skill that builds the project's canonical knowledge base. It's cloned from `Group-Active-IA/kb-creator` into the agent's skills directory and generates the 10 knowledge-base `.md` documents, either from existing sources or through an interactive interview. Choose it when starting a project, to document the domain, decisions, and context before generating the roadmap. It's part of the foundation (Full); if you already have your KB, you don't need it." }
    type: skill
    source: { repo: Group-Active-IA/kb-creator, ref: latest, method: clone }
    install_modes: [full]

  - id: roadmap-generator
    name: roadmap-generator
    description: { es: "Genera CHANGES.md (backlog técnico) desde la KB.", en: "Generates CHANGES.md (technical backlog) from the KB." }
    long_description: { es: "La skill que traduce la knowledge-base en un roadmap operativo de changes. Se clona desde `Group-Active-IA/roadmap-generator` al directorio de skills del agente y genera `CHANGES.md`: un índice de changes OpenSpec con árbol de dependencias, gates de paralelismo y camino crítico. Elegila después de armar la KB, cuando querés convertir el dominio documentado en un plan de implementación accionable. Depende de openspec y kb-creator, así que corre más tarde en la fundación.", en: "The skill that translates the knowledge base into an operational change roadmap. It's cloned from `Group-Active-IA/roadmap-generator` into the agent's skills directory and generates `CHANGES.md`: an index of OpenSpec changes with a dependency tree, parallelism gates, and the critical path. Choose it after building the KB, when you want to turn the documented domain into an actionable implementation plan. It depends on openspec and kb-creator, so it runs later in the foundation." }
    type: skill
    source: { repo: Group-Active-IA/roadmap-generator, ref: latest, method: clone }
    install_modes: [full]
    depends_on: [openspec, kb-creator]

  - id: agent-instruction
    name: agent-instruction
    description: { es: "Genera AGENTS.md/CLAUDE.md correcto con todas las referencias.", en: "Generates a correct AGENTS.md/CLAUDE.md with all references." }
    long_description: { es: "La skill que redacta la constitución operativa del proyecto—el `AGENTS.md`/`CLAUDE.md` con todas las referencias correctas. Se clona desde `JuanCruzRobledo/agent-instruction` al directorio de skills del agente y arma stack, convenciones, reglas duras y el mapa de navegación hacia la KB y el roadmap, sin duplicar lo que el orquestador global ya define. Elegila cuando querés que los agentes tengan reglas de proyecto claras y específicas en vez de improvisar. Es parte de la fundación (Full).", en: "The skill that writes the project's operating constitution—the `AGENTS.md`/`CLAUDE.md` with all the right references. It's cloned from `JuanCruzRobledo/agent-instruction` into the agent's skills directory and assembles the stack, conventions, hard rules, and the navigation map to the KB and roadmap, without duplicating what the global orchestrator already defines. Choose it when you want agents to have clear, project-specific rules instead of improvising. It's part of the foundation (Full)." }
    type: skill
    source: { repo: JuanCruzRobledo/agent-instruction, ref: latest, method: clone }
    install_modes: [full]

  - id: skill-registry
    name: skill-registry
    description: { es: "Crea/actualiza el registro de skills del proyecto.", en: "Creates/updates the project's skill registry." }
    long_description: { es: "La skill que crea y mantiene el registro de skills del proyecto. Se clona desde `JuanCruzRobledo/skill-registry` al directorio de skills del agente, escanea las skills disponibles y documenta cuáles aplican a cada convención del proyecto en un registro que los agentes pueden consultar. Elegila cuando querés que el orquestador sepa qué skills de dominio existen y cuándo usarlas, en vez de descubrirlas al azar. Es parte de la fundación (Full).", en: "The skill that creates and maintains the project's skill registry. It's cloned from `JuanCruzRobledo/skill-registry` into the agent's skills directory, scans the available skills, and documents which ones apply to each project convention in a registry agents can consult. Choose it when you want the orchestrator to know which domain skills exist and when to use them, instead of stumbling onto them. It's part of the foundation (Full)." }
    type: skill
    source: { repo: JuanCruzRobledo/skill-registry, ref: latest, method: clone }
    install_modes: [full]

  # ── Slash-commands (embebidos en el binario) ─────────────────────────────
  - id: starter-add-command
    name: Starter Add Command
    description: { es: "Slash-command /active:starter-add (Claude) / /active-starter-add (OpenCode) — wrapper thin sobre active-stack starter add.", en: "Slash-command /active:starter-add (Claude) / /active-starter-add (OpenCode) — thin wrapper over active-stack starter add." }
    long_description: { es: "El slash-command que expone la instalación de starters como comando nativo del agente. Materializa un archivo de comando en el directorio del agente—`/active:starter-add` en Claude, `/active-starter-add` en OpenCode—que es un wrapper delgado sobre `active-stack starter add`. Elegilo para agregar starters (backend, ux-ui, active-ia) desde adentro del agente sin salir a la terminal. Está acotado a Claude y OpenCode, e integra tanto en Lite como en Full por ser parte de la superficie mínima útil.", en: "The slash-command that exposes starter installation as a native agent command. It materializes a command file in the agent's directory—`/active:starter-add` in Claude, `/active-starter-add` in OpenCode—as a thin wrapper over `active-stack starter add`. Choose it to add starters (backend, ux-ui, active-ia) from inside the agent without dropping to a terminal. It's scoped to Claude and OpenCode and ships in both Lite and Full, as part of the minimal useful surface." }
    type: command
    # Scoped to the two focused P0 agents only (Claude + OpenCode).
    # Other agent variants are out of scope for C-31 (D3: focused-only).
    agents: [claude, opencode]
    # Lite + Full: the command surface is part of the minimal useful install.
    install_modes: [lite, full]

  # ── Skills de terceros (se descargan con el stack) ────────────────────────
  - id: find-skill
    name: find-skill
    description: { es: "Busca y recomienda skills relevantes (registry de Vercel).", en: "Finds and recommends relevant skills (Vercel's registry)." }
    long_description: { es: "La skill de terceros que busca y recomienda skills instalables relevantes a lo que pedís. Se clona desde el registry de Vercel (`vercel-labs/skills`, subdir `skills/find-skills`) al directorio de skills del agente y consulta ese catálogo para sugerir capacidades que encajen con tu tarea. Elegila cuando no sabés si existe una skill para lo que querés hacer y preferís descubrirla antes que armarla. Es best-effort: si el clone falla, el install no aborta, porque el layout de un repo de terceros puede cambiar.", en: "The third-party skill that finds and recommends installable skills relevant to your request. It's cloned from Vercel's registry (`vercel-labs/skills`, subdir `skills/find-skills`) into the agent's skills directory and queries that catalog to suggest capabilities matching your task. Choose it when you're not sure a skill exists for what you want and prefer discovering one over building it. It's best-effort: if the clone fails the install doesn't abort, since a third-party repo's layout can change." }
    type: skill
    third_party: true
    best_effort: true # falla del clone no aborta el install (terceros: layout puede cambiar)
    # ID propio "find-skill"; el skill upstream se llama "find-skills" (PLURAL) y vive en un subdir.
    source: { repo: vercel-labs/skills, ref: latest, method: clone, path: skills/find-skills }
    install_modes: [full]

  - id: skill-creator
    name: skill-creator
    description: { es: "Crea nuevas skills siguiendo la spec de Agent Skills.", en: "Creates new skills following the Agent Skills spec." }
    long_description: { es: "La skill de terceros que guía la creación de una skill nueva completa. Se clona desde `anthropics/skills` (subdir `skills/skill-creator`) al directorio de skills del agente y te acompaña a armar el `SKILL.md` y sus assets conforme a la especificación oficial de Agent Skills. Elegila cuando querés empaquetar un flujo repetible como skill reutilizable y bien formada. Es best-effort: si el clone falla, el install no aborta, porque el layout upstream puede cambiar.", en: "The third-party skill that guides the creation of a complete new skill. It's cloned from `anthropics/skills` (subdir `skills/skill-creator`) into the agent's skills directory and walks you through authoring the `SKILL.md` and its assets per the official Agent Skills specification. Choose it when you want to package a repeatable workflow into a reusable, well-formed skill. It's best-effort: if the clone fails the install doesn't abort, since the upstream layout can change." }
    type: skill
    third_party: true
    best_effort: true # falla del clone no aborta el install (terceros: layout puede cambiar)
    source: { repo: anthropics/skills, ref: latest, method: clone, path: skills/skill-creator }
    install_modes: [full]

